name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Switch backend: set BACKEND secret to "datomic" or "datalevin" (default: datomic)
          BACKEND: ${{ secrets.BACKEND != '' && secrets.BACKEND || 'datomic' }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          envs: OPENAI_API_KEY,BACKEND
          script: |
            set -euo pipefail

            APP_DIR="/opt/ai-memory"
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Persist env vars for docker compose
            grep -q '^OPENAI_API_KEY=' .env 2>/dev/null && sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${OPENAI_API_KEY}|" .env || echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
            grep -q '^BACKEND=' .env 2>/dev/null && sed -i "s|^BACKEND=.*|BACKEND=${BACKEND}|" .env || echo "BACKEND=${BACKEND}" >> .env

            # Build services based on backend choice
            PULL_SERVICES="qdrant prometheus grafana"
            BUILD_SERVICES="app"
            if [ "$BACKEND" = "datomic" ]; then
              BUILD_SERVICES="app datomic"
            fi

            $COMPOSE pull $PULL_SERVICES
            $COMPOSE build --parallel $BUILD_SERVICES
            $COMPOSE up -d --remove-orphans

            echo "Waiting for app health..."
            sleep 15
            for i in $(seq 1 36); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                echo "App healthy after ~$((15 + i * 5))s!"
                break
              fi
              if [ "$i" -eq 36 ]; then echo "Health check timeout" && exit 1; fi
              sleep 5
            done

            $COMPOSE ps
            docker image prune -f
