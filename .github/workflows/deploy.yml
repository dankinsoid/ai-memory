name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          envs: OPENAI_API_KEY
          script: |
            set -euo pipefail

            APP_DIR="/opt/ai-memory"
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Ensure OPENAI_API_KEY is in .env
            grep -q '^OPENAI_API_KEY=' .env 2>/dev/null && sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${OPENAI_API_KEY}|" .env || echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env

            $COMPOSE pull qdrant prometheus grafana
            $COMPOSE build --parallel app datomic
            $COMPOSE up -d --remove-orphans

            echo "Waiting for app health..."
            sleep 15
            for i in $(seq 1 36); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                echo "App healthy after ~$((15 + i * 5))s!"
                break
              fi
              [ "$i" -eq 36 ] && echo "Health check timeout" && exit 1
              sleep 5
            done

            $COMPOSE ps
            docker image prune -f
