# Production overrides — merged with docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  datomic:
    ports:
      - "127.0.0.1:4334:4334"
      - "127.0.0.1:4335:4335"
      - "127.0.0.1:4336:4336"
    restart: unless-stopped
    environment:
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    ports:
      - "0.0.0.0:8080:8080"
    restart: unless-stopped
    environment:
      - DATOMIC_URI=datomic:dev://datomic:4334/ai-memory
      - PORT=8080
      - EMBEDDING_URL=http://embedding:80
      - QDRANT_URL=http://qdrant:6333
      - BLOB_PATH=/data/blobs
      - JAVA_TOOL_OPTIONS=-Xmx256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  embedding:
    ports:
      - "127.0.0.1:8090:80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
