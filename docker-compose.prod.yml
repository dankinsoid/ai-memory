# Production overrides — merged with docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  datomic:
    restart: unless-stopped
    environment:
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    restart: unless-stopped
    environment:
      - DATOMIC_URI=datomic:dev://datomic:4334/ai-memory?password=datomic
      - PORT=8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - BLOB_PATH=/data/blobs
      - JAVA_TOOL_OPTIONS=-Xmx256m
      - API_TOKEN=${API_TOKEN}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    restart: unless-stopped

  grafana:
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
