services:
  datomic:
    build: docker/datomic
    volumes:
      - datomic-data:/data
    ports:
      - "127.0.0.1:4334:4334"
      - "127.0.0.1:4335:4335"
      - "127.0.0.1:4336:4336"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/4334"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        BACKEND: ${BACKEND:-datomic}
    ports:
      - "8080:8080"
    volumes:
      - blob-data:/data/blobs
    environment:
      - DATOMIC_URI=datomic:dev://datomic:4334/ai-memory?password=datomic
      - PORT=8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - BLOB_PATH=/data/blobs
    depends_on:
      datomic:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  datomic-data:
  blob-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
