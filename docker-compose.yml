services:
  datomic:
    build: docker/datomic
    volumes:
      - datomic-data:/data
    ports:
      - "4334:4334"
      - "4335:4335"
      - "4336:4336"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/4334"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - blob-data:/data/blobs
    environment:
      - DATOMIC_URI=datomic:dev://datomic:4334/ai-memory
      - PORT=8080
      - EMBEDDING_URL=http://embedding:80
      - QDRANT_URL=http://qdrant:6333
      - BLOB_PATH=/data/blobs
    depends_on:
      datomic:
        condition: service_healthy
      embedding:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    platform: linux/amd64
    ports:
      - "8090:80"
    volumes:
      - embedding-models:/data
    command: --model-id nomic-ai/modernbert-embed-base
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/80"]
      start_period: 180s
      interval: 10s
      timeout: 5s
      retries: 30

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  datomic-data:
  blob-data:
  embedding-models:
  qdrant-data:
  prometheus-data:
  grafana-data:
